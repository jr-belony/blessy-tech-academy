<form>
    <label for="contact-nom">Nom :</label><br>
    <input type="text" id="contact-nom" name="nom" required>
    <br><br>

    <label for="contact-email">Email :</label><br>
    <input type="email" id="contact-email" name="email" required>
    <br><br>

    <label for="contact-sujet">Sujet :</label><br>
    <select id="contact-sujet" name="sujet">
        <option value="question">Question formation</option>
        <option value="inscription">Inscription</option>
        <option value="autre">Autre</option>
    </select>
    <br><br>

    <label for="contact-message">Message :</label><br>
    <textarea id="contact-message" name="message" rows="5"></textarea>
    <br><br>

    <button type="submit">Envoyer</button>
</form>
