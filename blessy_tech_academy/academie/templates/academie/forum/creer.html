{% extends 'academie/base.html' %}

{% block titre %}Nouveau sujet — Forum BTA{% endblock %}

{% block contenu %}

<section class="page-hero">
    <h2>✏️ Nouveau sujet</h2>
    <p>Pose ta question ou partage quelque chose avec la communauté.</p>
</section>

<section style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">
    <div style="background: white; padding: 40px; border-radius: 16px;
                box-shadow: var(--ombre-legere);">

        <form method="POST" id="form-sujet">
            {% csrf_token %}

            <div class="form-groupe">
                <label>Titre du sujet *</label>
                {{ form.titre }}
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-groupe">
                    <label>Catégorie *</label>
                    {{ form.categorie }}
                </div>
                <div class="form-groupe">
                    <label>Formation liée (optionnel)</label>
                    {{ form.formation }}
                </div>
            </div>

            <div class="form-groupe" style="margin-top: 16px;">
                <label>Contenu *</label>
                <div id="editor-contenu" style="border: 2px solid var(--gris-border);
                     border-radius: 8px; min-height: 300px; padding: 12px;"></div>
                <input type="hidden" name="contenu" id="contenu-hidden">
            </div>

            <div style="display: flex; gap: 16px; justify-content: flex-end; margin-top: 24px;">
                <a href="{% url 'forum_liste' %}"
                   style="color: var(--gris-texte); text-decoration: none;
                          font-weight: 600; padding: 12px 24px;">
                    Annuler
                </a>
                <button type="button" onclick="soumettreFormulaire()"
                        class="btn btn-principal">
                    🚀 Publier le sujet
                </button>
            </div>
        </form>
    </div>
</section>

<script>
const {
    ClassicEditor,
    Essentials,
    Bold,
    Italic,
    Underline,
    Strikethrough,
    Paragraph,
    Heading,
    Link,
    List,
    BlockQuote,
    Alignment,
    FontColor,
    FontSize,
    FontBackgroundColor,
    Undo
} = CKEDITOR;

let editeurContenu;

ClassicEditor.create(document.querySelector('#editor-contenu'), {
    plugins: [
        Essentials, Bold, Italic, Underline, Strikethrough,
        Paragraph, Heading, Link, List, BlockQuote,
        Alignment, FontColor, FontSize, FontBackgroundColor, Undo
    ],
    toolbar: {
        items: [
            'heading', '|',
            'bold', 'italic', 'underline', 'strikethrough', '|',
            'fontSize', 'fontColor', 'fontBackgroundColor', '|',
            'alignment', '|',
            'bulletedList', 'numberedList', '|',
            'link', 'blockQuote', '|',
            'undo', 'redo'
        ]
    },
    language: 'fr'
}).then(editor => {
    editeurContenu = editor;
}).catch(error => {
    console.error('CKEditor error:', error);
});

function soumettreFormulaire() {
    if (editeurContenu) {
        document.getElementById('contenu-hidden').value =
            editeurContenu.getData();
    }
    document.getElementById('form-sujet').submit();
}
</script>
{% endblock %}
