{% extends 'academie/base.html' %}

{% block titre %}Contact — Blessy Tech Academy{% endblock %}

{% block contenu %}

<section class="page-hero">
    <h2>Contactez-nous</h2>
    <p>Notre équipe vous répond dans les 24 heures.</p>
</section>

<section class="section-contact">
    <h2 style="color: var(--bleu-principal); margin-bottom: 32px;
               text-align: center;">
        Envoyer un message
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-groupe">
            <label for="contact-prenom">Prénom *</label>
            <input type="text" id="contact-prenom"
                   name="prenom" required
                   placeholder="Jean Raymond">
        </div>

        <div class="form-groupe">
            <label for="contact-nom">Nom *</label>
            <input type="text" id="contact-nom"
                   name="nom" required
                   placeholder="BELONY">
        </div>

        <div class="form-groupe">
            <label for="contact-email">Email *</label>
            <input type="email" id="contact-email"
                   name="email" required
                   placeholder="exemple@email.com">
        </div>

        <div class="form-groupe">
            <label for="contact-sujet">Sujet *</label>
            <select id="contact-sujet" name="sujet" required>
                <option value="">-- Choisir --</option>
                <option value="inscription">S'inscrire à une formation</option>
                <option value="information">Demande d'information</option>
                <option value="partenariat">Partenariat</option>
                <option value="autre">Autre</option>
            </select>
        </div>

        <div class="form-groupe">
            <label for="contact-message">Message *</label>
            <textarea id="contact-message"
                      name="message" required
                      placeholder="Votre message..."></textarea>
        </div>

        <button type="submit" class="btn btn-principal"
                style="width:100%; text-align:center; padding:14px;">
            ✉️ Envoyer le message
        </button>
    </form>
</section>

{% endblock %}
