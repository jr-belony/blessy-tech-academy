[tool.black]
line-length = 100
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 100
skip = ["migrations"]

[tool.ruff]
line-length = 100
exclude = ["migrations"]
include = ["*.py", "academie/**/*.py", "blessy_tech_academy/**/*.py"]

select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort (tri des imports)
    "N",   # pep8-naming
    "UP",  # pyupgrade (modernisation Python)
]

ignore = ["E501"]  # longueur de ligne (gérée par black)